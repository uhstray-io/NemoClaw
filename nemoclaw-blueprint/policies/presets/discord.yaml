# Fixed discord preset: use access: full for CONNECT tunnel compatibility.
# Upstream uses tls: terminate which causes 403 on HTTPS CONNECT tunnels.
# See: https://github.com/NVIDIA/NemoClaw/issues/685

preset:
  name: discord
  description: "Discord API, gateway, and CDN access"

network_policies:
  discord:
    name: discord
    endpoints:
      - host: discord.com
        port: 443
        access: full
      - host: gateway.discord.gg
        port: 443
        access: full
      - host: cdn.discordapp.com
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/local/bin/openclaw }
      - { path: /usr/bin/curl }
